<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #273549;
            --border: rgba(99, 102, 241, 0.15);
            --primary: #6366f1;
            --primary-lt: #818cf8;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.10);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.10);
            --warn: #f59e0b;
            --warn-bg: rgba(245, 158, 11, 0.10);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.35);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 1024px;
            width: 100%;
            margin: 0 auto;
            padding: 48px 24px;
            flex: 1;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 24px rgba(99, 102, 241, 0.35);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            stroke: #fff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 0.8125rem;
            color: var(--muted);
            margin-top: 3px;
        }

        /* ── Status badge ── */
        #status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8125rem;
            font-weight: 500;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        #status.online {
            background: var(--success-bg);
            border-color: rgba(34, 197, 94, .25);
            color: var(--success);
        }

        #status.offline {
            background: var(--error-bg);
            border-color: rgba(239, 68, 68, .25);
            color: var(--error);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        #status.online .status-dot {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .55;
                transform: scale(.8);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .status-dot {
                animation: none !important;
            }
        }

        /* ── Stat cards ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
        }

        .stat-label {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.875rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text);
        }

        .stat-value.accent {
            color: var(--primary-lt);
        }

        /* ── Table card ── */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .table-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .table-head h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .table-head p {
            font-size: 0.8125rem;
            color: var(--muted);
            margin-top: 3px;
            font-weight: 400;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 11px 20px;
            text-align: left;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            background: rgba(15, 23, 42, .45);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.12s ease;
        }

        tbody tr:hover td {
            background: var(--surface-2);
        }

        tbody td {
            padding: 14px 20px;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(99, 102, 241, 0.07);
            transition: background 0.12s ease;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .td-name {
            font-weight: 600;
        }

        .td-legajo {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.8125rem;
            color: var(--primary-lt);
        }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-feat {
            background: rgba(99, 102, 241, .12);
            color: var(--primary-lt);
        }

        .badge-active {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-pending {
            background: var(--warn-bg);
            color: var(--warn);
        }

        .badge-default {
            background: rgba(148, 163, 184, .1);
            color: var(--muted);
        }

        /* ── Skeleton ── */
        .skeleton {
            height: 13px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--surface-2) 25%, rgba(99, 102, 241, .07) 50%, var(--surface-2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .skeleton {
                animation: none;
                background: var(--surface-2);
            }
        }

        .skel-row td {
            padding: 18px 20px;
        }

        /* ── Error / Empty ── */
        .error-row td {
            color: var(--error);
            font-size: 0.875rem;
            text-align: center;
            padding: 40px 20px;
        }

        /* ── Footer ── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px 24px;
            font-size: 0.75rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            main {
                padding: 28px 16px;
            }

            .header {
                margin-bottom: 28px;
            }

            .logo-text h1 {
                font-size: 1.25rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            thead th,
            tbody td {
                padding: 12px 14px;
            }
        }
    </style>
</head>

<body>
    <main>
        <header class="header">
            <div class="logo">
                <div class="logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>TeamBoard</h1>
                    <p>Ingeniería de Software · 2026</p>
                </div>
            </div>
            <div id="status" role="status" aria-live="polite">
                <span class="status-dot" aria-hidden="true"></span>
                <span id="status-text">Verificando backend…</span>
            </div>
        </header>

        <div class="stats" id="stats-row" aria-hidden="true" style="display:none">
            <div class="stat-card">
                <div class="stat-label">Integrantes</div>
                <div class="stat-value accent" id="stat-total">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Features</div>
                <div class="stat-value" id="stat-features">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Servicios</div>
                <div class="stat-value" id="stat-services">—</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-head">
                <h2>Equipo</h2>
                <p>Integrantes y asignaciones del sprint</p>
            </div>
            <div class="table-wrapper">
                <table aria-label="Integrantes del equipo">
                    <thead>
                        <tr>
                            <th scope="col">Nombre</th>
                            <th scope="col">Legajo</th>
                            <th scope="col">Feature</th>
                            <th scope="col">Servicio</th>
                            <th scope="col">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="team-table">
                        <tr class="skel-row">
                            <td>
                                <div class="skeleton" style="width:140px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:68px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:110px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:88px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:58px"></div>
                            </td>
                        </tr>
                        <tr class="skel-row">
                            <td>
                                <div class="skeleton" style="width:160px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:68px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:130px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:88px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:58px"></div>
                            </td>
                        </tr>
                        <tr class="skel-row">
                            <td>
                                <div class="skeleton" style="width:125px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:68px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:100px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:88px"></div>
                            </td>
                            <td>
                                <div class="skeleton" style="width:58px"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        TeamBoard · Ingeniería y Calidad de Software · UTN 2026
    </footer>

    <script src="app.js"></script>
</body>

</html>
